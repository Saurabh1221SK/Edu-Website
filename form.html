<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a style="color:#edc292;" class="navbar-brand" href="index.html">Saurabh Edu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="./index.html">Testimonials</a></li>
                    <li class="nav-item"><a class="nav-link" href="./form.html">Contact</a></li>
                    <li class="nav-item"><a class="btn btn-dark ms-lg-2" href="#">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="py-5 bg-light">
        <div class="container">

            <div class="text-center mb-5">
                <h2>Contact Us</h2>
                <p class="text-muted">
                    We'd love to hear from you. Fill out the form below.
                </p>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">

                    <div class="card shadow border-0">
                        <div class="card-body p-4">

                            <form>

                                <div class="mb-3">
                                    <label for="name" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="name"
                                        placeholder="Enter your full name">
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email"
                                        placeholder="Enter your email">
                                    <div class="form-text">
                                        We'll never share your email with anyone else.
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone"
                                        placeholder="Enter your phone number">
                                </div>

                                <div class="mb-3">
                                    <label for="subject" class="form-label">Subject</label>
                                    <input type="text" class="form-control" id="subject"
                                        placeholder="Enter subject">
                                </div>

                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" id="message" rows="5"
                                        placeholder="Write your message here"></textarea>
                                </div>

                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="terms">
                                    <label class="form-check-label" for="terms">
                                        I agree to the Terms & Conditions.
                                    </label>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">
                                    Send Message
                                </button>

                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>
    <footer class="bg-dark py-2 text-center text-white">
        <p>&copy;2026 SaurabhEdu. All Rights Reserved</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
